name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn playwright install --with-deps chromium
      - run: yarn codegen:check
      - run: yarn typecheck
      - run: yarn test
      - run: yarn e2e
      - run: yarn build
