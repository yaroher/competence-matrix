<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Competence Matrix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Конструктор матрицы компетенций — навыки, грейды, роли и целевые уровни." />
    <meta name="color-scheme" content="dark light" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply persisted theme before paint to avoid a flash.
      (function () {
        try {
          var stored = localStorage.getItem('comatrix-theme');
          var dark = stored ? stored === 'dark' : true;
          if (stored === 'system') {
            dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          }
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
