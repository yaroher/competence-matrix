services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: comatrix
      POSTGRES_USER: comatrix
      POSTGRES_PASSWORD: comatrix
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comatrix -d comatrix"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

