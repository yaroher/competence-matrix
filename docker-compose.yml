services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: comatrix
      POSTGRES_USER: comatrix
      POSTGRES_PASSWORD: comatrix
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comatrix -d comatrix"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "yarn install --frozen-lockfile && yarn build:packages && COMATRIX_DATA_SOURCE=postgres yarn workspace @comatrix/api start"
    environment:
      COMATRIX_API_PORT: "4000"
      COMATRIX_DATA_SOURCE: postgres
      COMATRIX_DATABASE_URL: postgres://comatrix:comatrix@postgres:5432/comatrix
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/readyz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    volumes:
      - ./:/app
      - /app/node_modules

  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "yarn install --frozen-lockfile && yarn build:packages && yarn workspace @comatrix/web start --host 0.0.0.0"
    ports:
      - "4200:4200"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./:/app
      - /app/node_modules

volumes:
  postgres-data:

