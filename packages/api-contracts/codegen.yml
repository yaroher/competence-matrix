schema: ./src/schema.graphql
documents: ./src/operations/**/*.graphql
generates:
  ./src/generated/graphql.ts:
    plugins:
      - typescript
      - typescript-operations
      - typed-document-node
    config:
      immutableTypes: true
      avoidOptionals: true
      maybeValue: T | null
      scalars:
        ID: string
        String: string
        Int: number
        Float: number
        Boolean: boolean
