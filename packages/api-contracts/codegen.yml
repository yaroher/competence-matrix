schema: ./src/schema.graphql
documents: ./src/operations/**/*.graphql
generates:
  ./src/generated/graphql.ts:
    plugins:
      - typescript-operations
      - typed-document-node
    config:
      immutableTypes: true
      avoidOptionals:
        field: true
        inputValue: false
        object: true
      maybeValue: T | null
      preResolveTypes: true
      scalars:
        ID:
          input: string
          output: string
        String:
          input: string
          output: string
        Int:
          input: number
          output: number
        Float:
          input: number
          output: number
        Boolean:
          input: boolean
          output: boolean
