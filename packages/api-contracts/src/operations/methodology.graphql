query LevelScalesDetailed {
  levelScales {
    id
    name
    isDefault
    levels {
      value
      title
    }
    dimensionDescriptors {
      levelValue
      dimension
      description
    }
  }
}

query ScoringRulesList {
  scoringRules {
    id
    name
    isDefault
    confidenceThreshold
  }
}

mutation SetDefaultScoringRule($id: ID!) {
  setDefaultScoringRule(id: $id) {
    id
    name
    isDefault
    confidenceThreshold
  }
}

mutation CreateLevelScale($input: NameInput!) {
  createLevelScale(input: $input) { id name }
}
mutation CreateScoringRuleOp($input: ScoringRuleInput!) {
  createScoringRule(input: $input) { id name confidenceThreshold }
}
mutation UpsertLevelDimensionDescriptor($input: LevelDimensionDescriptorInput!) {
  upsertLevelDimensionDescriptor(input: $input) { id levelValue dimension description }
}
