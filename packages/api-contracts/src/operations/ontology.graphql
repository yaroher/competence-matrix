query OntologyAdmin {
  ontology {
    categories {
      id
      name
      description
      categoryType
      status
      competencies {
        id
        code
        name
        description
        tags
        validationStatus
      }
    }
  }
}

mutation CreateCompetencyCategory($input: CompetencyCategoryInput!) {
  createCompetencyCategory(input: $input) {
    id
    name
    description
    categoryType
  }
}

mutation UpdateCompetencyCategory($input: UpdateCompetencyCategoryInput!) {
  updateCompetencyCategory(input: $input) {
    id
    name
    description
    categoryType
  }
}

mutation DeleteCompetencyCategory($id: ID!) {
  deleteCompetencyCategory(id: $id)
}

mutation CreateCompetency($input: CompetencyInput!) {
  createCompetency(input: $input) {
    id
    code
    name
    description
    tags
  }
}

mutation UpdateCompetency($input: UpdateCompetencyInput!) {
  updateCompetency(input: $input) {
    id
    name
    description
    tags
  }
}

mutation DeleteCompetency($id: ID!) {
  deleteCompetency(id: $id)
}
