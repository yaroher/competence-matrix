query PeopleAssignments {
  currentActor {
    user {
      id
      email
      role
    }
    person {
      id
      fullName
      email
      currentAssignment {
        id
        status
        effectiveFrom
        effectiveTo
        orgUnit {
          id
          name
          type
        }
        manager {
          id
          fullName
        }
        roleProfile {
          id
          name
        }
      }
    }
  }
  orgUnits {
    id
    parentId
    type
    name
    status
  }
  people {
    id
    fullName
    email
    currentAssignment {
      id
      status
      effectiveFrom
      orgUnit {
        id
        name
        type
      }
      manager {
        id
        fullName
      }
      roleProfile {
        id
        name
      }
    }
  }
  calibrationSessions {
    id
    name
    status
    decisions {
      id
      originalLevel
      calibratedLevel
      diff
      reason
      score {
        id
        competency {
          id
          code
          name
        }
      }
    }
  }
  levelScales {
    id
    name
    isDefault
    status
    levels {
      value
      title
      description
    }
    dimensionDescriptors {
      id
      levelValue
      dimension
      description
    }
  }
  scoringRules {
    id
    name
    confidenceThreshold
    isDefault
    status
  }
  organizationGapSummary {
    assessedPeople
    totalPeople
    coveragePercent
    criticalGapCount
    byCompetency {
      competencyId
      competencyName
      criticality
      assessedPeople
      totalGap
      avgGap
      isCritical
    }
  }
}
