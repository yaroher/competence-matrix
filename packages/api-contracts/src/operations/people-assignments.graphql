query PeopleAssignments {
  currentActor {
    user {
      id
      email
      role
    }
    person {
      id
      fullName
      email
      currentAssignment {
        id
        status
        effectiveFrom
        effectiveTo
        orgUnit {
          id
          name
          type
        }
        manager {
          id
          fullName
        }
        roleProfile {
          id
          name
        }
      }
    }
  }
  orgUnits {
    id
    parentId
    type
    name
    status
  }
  people {
    id
    fullName
    email
    currentAssignment {
      id
      status
      effectiveFrom
      orgUnit {
        id
        name
        type
      }
      manager {
        id
        fullName
      }
      roleProfile {
        id
        name
      }
    }
  }
}
